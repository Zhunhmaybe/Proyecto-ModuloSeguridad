{% extends 'base.html' %}

{% block content %}

<style>
*{box-sizing:border-box}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    min-height:100vh;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:40px 25px;
}

h1{
    color:white;
    margin-bottom:25px;
    font-size:2rem;
    font-weight:700;
    letter-spacing:.5px;
}

.card{
    background:rgba(17,24,39,.95);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:20px;
    padding:30px;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
    max-width:700px;
}

.card h3{
    margin-top:0;
    margin-bottom:20px;
    font-size:1.1rem;
    color:#e2e8f0;
    border-left:4px solid #3b82f6;
    padding-left:12px;
    font-weight:600;
}

label{
    display:block;
    margin-top:18px;
    margin-bottom:6px;
    color:#94a3b8;
    font-size:.85rem;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:.5px;
}

input[type="text"],
input[type="email"]{
    width:100%;
    padding:12px 15px;
    border-radius:10px;
    border:1px solid #334155;
    background:#1e293b;
    color:white;
    font-size:.95rem;
    transition:all .3s ease;
}

input[type="text"]:focus,
input[type="email"]:focus{
    outline:none;
    border-color:#3b82f6;
    box-shadow:0 0 0 3px rgba(59,130,246,.2);
}

/* Toggle estado */
.toggle-wrapper{
    display:flex;
    align-items:center;
    gap:12px;
    margin-top:6px;
    padding:14px 16px;
    background:#1e293b;
    border:1px solid #334155;
    border-radius:10px;
}

.toggle{
    position:relative;
    width:44px;height:24px;
    flex-shrink:0;
}

.toggle input{
    opacity:0;
    width:0;height:0;
    position:absolute;
}

.toggle-slider{
    position:absolute;
    inset:0;
    background:#334155;
    border-radius:999px;
    cursor:pointer;
    transition:.3s;
}

.toggle-slider:before{
    content:'';
    position:absolute;
    width:18px;height:18px;
    left:3px;top:3px;
    background:white;
    border-radius:50%;
    transition:.3s;
}

.toggle input:checked + .toggle-slider{
    background:#2563eb;
}

.toggle input:checked + .toggle-slider:before{
    transform:translateX(20px);
}

.toggle-label{
    font-size:.9rem;
    color:#cbd5e1;
    margin:0;
    text-transform:none;
    letter-spacing:0;
    font-weight:400;
}

/* Roles */
.roles-box{
    margin-top:6px;
    background:#1e293b;
    border:1px solid #334155;
    border-radius:12px;
    padding:18px;
}

.roles-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:10px;
    margin-top:4px;
}

.role-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 14px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.07);
    border-radius:9px;
    cursor:pointer;
    transition:.2s;
}

.role-item:hover{
    background:rgba(59,130,246,.1);
    border-color:rgba(59,130,246,.3);
}

.role-item input[type="checkbox"]{
    width:16px;height:16px;
    accent-color:#3b82f6;
    cursor:pointer;
    flex-shrink:0;
}

.role-item span{
    font-size:.88rem;
    color:#cbd5e1;
    font-weight:500;
}

.no-roles{
    color:#475569;
    font-size:.88rem;
    font-style:italic;
}

/* Botones */
.form-actions{
    display:flex;
    align-items:center;
    gap:12px;
    margin-top:28px;
    flex-wrap:wrap;
}

button[type="submit"]{
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    color:white;
    border:none;
    padding:12px 24px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    font-size:.9rem;
    transition:.3s;
}

button[type="submit"]:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(37,99,235,.4);
}

.btn-back{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:#334155;
    padding:12px 20px;
    border-radius:10px;
    color:white;
    text-decoration:none;
    font-weight:600;
    font-size:.9rem;
    transition:.3s;
}

.btn-back:hover{
    background:#475569;
    transform:translateY(-2px);
}
</style>

<div class="container">

    <h1>✏ Editar Usuario</h1>

    <div class="card">

        <form method="POST">
            {% csrf_token %}

            <label>Usuario</label>
            <input
                type="text"
                name="user_name"
                value="{{ usuario.user_name }}"
                required>

            <label>Correo</label>
            <input
                type="email"
                name="email"
                value="{{ usuario.email }}"
                required>

            <label>Estado</label>
            <div class="toggle-wrapper">
                <label class="toggle">
                    <input
                        type="checkbox"
                        name="estado"
                        {% if usuario.estado %}checked{% endif %}>
                    <span class="toggle-slider"></span>
                </label>
                <span class="toggle-label">Cuenta activa</span>
            </div>

            <label>Asignar Roles</label>
            <div class="roles-box">
                <div class="roles-grid">
                    {% for rol in roles %}
                    <label class="role-item">
                        <input
                            type="checkbox"
                            name="roles"
                            value="{{ rol.id_rol }}"
                            {% if rol in usuario.roles.all %}checked{% endif %}>
                        <span>{{ rol.nombre_rol }}</span>
                    </label>
                    {% empty %}
                    <p class="no-roles">No existen roles creados</p>
                    {% endfor %}
                </div>
            </div>

            <div class="form-actions">
                <button type="submit">💾 Guardar cambios</button>
                <a href="{% url 'usuarios' %}" class="btn-back">⬅ Volver</a>
            </div>

        </form>

    </div>

</div>

{% endblock %}
