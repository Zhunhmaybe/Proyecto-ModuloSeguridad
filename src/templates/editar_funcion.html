{% extends 'base.html' %}
{% block title %}Editar Función{% endblock %}

{% block breadcrumb %}
<span class="breadcrumb-separator"><i class="fa-solid fa-chevron-right"></i></span>
<a href="{% url 'funciones' %}" class="breadcrumb-item">Funciones</a>
<span class="breadcrumb-separator"><i class="fa-solid fa-chevron-right"></i></span>
<span class="breadcrumb-current">Editar: {{ funcion.nombre_funcion }}</span>
{% endblock %}

{% block content %}
<div class="page-header"><h1>✏️ Editar Función</h1></div>

<div class="card" style="max-width:700px">
    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label class="form-label">Nombre función</label>
            <input type="text" name="nombre_funcion" value="{{ funcion.nombre_funcion }}" required>
        </div>

        <div class="form-group">
            <label class="form-label">Estado</label>
            <div class="toggle-wrapper">
                <label class="toggle">
                    <input type="checkbox" name="estado" {% if funcion.estado_funcion %}checked{% endif %}>
                    <span class="toggle-slider"></span>
                </label>
                <span class="toggle-label">Función activa</span>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">💾 Guardar cambios</button>
            <a href="{% url 'funciones' %}" class="btn-back" style="margin-top:0">⬅ Volver</a>
        </div>
    </form>
</div>
{% endblock %}
